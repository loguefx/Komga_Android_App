name: Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get version name
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/komga-android-${{ steps.version.outputs.version }}-debug.apk
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/komga-android-${{ steps.version.outputs.version }}-release-unsigned.apk

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: komga-android-${{ steps.version.outputs.version }}-debug
          path: app/build/outputs/apk/debug/komga-android-${{ steps.version.outputs.version }}-debug.apk
          retention-days: 30

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: komga-android-${{ steps.version.outputs.version }}-release-unsigned
          path: app/build/outputs/apk/release/komga-android-${{ steps.version.outputs.version }}-release-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Komga Android ${{ steps.version.outputs.version }}
          body: |
            ## Komga Android App ${{ steps.version.outputs.version }}

            ### Installation
            1. Download `komga-android-*-debug.apk` below
            2. Transfer to your Android device
            3. Enable **Install unknown apps** in Android Settings
            4. Open the APK to install

            ### What's included
            - **Debug APK** — ready to install, includes logging
            - **Release APK (unsigned)** — optimized build, requires signing before distribution

            ### First launch
            Enter your Komga server URL (e.g. `http://192.168.1.100:25600`), email, and password.
          files: |
            app/build/outputs/apk/debug/komga-android-${{ steps.version.outputs.version }}-debug.apk
            app/build/outputs/apk/release/komga-android-${{ steps.version.outputs.version }}-release-unsigned.apk
          draft: false
          prerelease: false
